<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Campus - Restablecer contrasena</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="loadingState">
        <div class="icon loading">...</div>
        <h1>Verificando enlace...</h1>
        <p class="subtitle">Un momento por favor</p>
      </div>

      <div id="formState" style="display:none;">
        <h1>Nueva contrasena</h1>
        <p class="subtitle">Ingresa tu nueva contrasena</p>
        <form id="resetForm">
          <label for="password">Nueva contrasena</label>
          <input type="password" id="password" minlength="8" required placeholder="Minimo 8 caracteres" />

          <label for="confirmPassword">Confirmar contrasena</label>
          <input type="password" id="confirmPassword" minlength="8" required placeholder="Repite tu contrasena" />

          <button type="submit" id="submitBtn">Actualizar contrasena</button>
        </form>
        <div class="message" id="messageBox"></div>
      </div>

      <div id="errorState" style="display:none;">
        <div class="icon error">X</div>
        <h1>Enlace invalido o expirado</h1>
        <p class="subtitle">Solicita un nuevo enlace de recuperacion desde la app.</p>
      </div>

      <div id="successState" style="display:none;">
        <div class="icon success">OK</div>
        <h1>Contrasena actualizada</h1>
        <p class="subtitle">Ya puedes volver a la app e iniciar sesion.</p>
        <button id="backToAppBtn">Volver a la app</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@16"></script>
  <script src="config.js"></script>
  <script>
    const { endpoint, projectId, appDeepLink } = window.APPWRITE_CONFIG;
    const { Client, Account } = Appwrite;
    const client = new Client().setEndpoint(endpoint).setProject(projectId);
    const account = new Account(client);

    const loadingState = document.getElementById('loadingState');
    const formState = document.getElementById('formState');
    const errorState = document.getElementById('errorState');
    const successState = document.getElementById('successState');
    const messageBox = document.getElementById('messageBox');

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const secret = params.get('secret');

    function showState(state) {
      [loadingState, formState, errorState, successState].forEach(el => el.style.display = 'none');
      state.style.display = 'block';
    }

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message show ${type}`;
    }

    if (!userId || !secret) {
      showState(errorState);
    } else {
      showState(formState);
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      if (password !== confirmPassword) {
        showMessage('Las contrasenas no coinciden', 'error');
        return;
      }

      if (password.length < 8) {
        showMessage('La contrasena debe tener al menos 8 caracteres', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Actualizando...';

      try {
        await account.updateRecovery(userId, secret, password, password);
        showState(successState);
      } catch (err) {
        showMessage(err.message || 'No se pudo actualizar', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Actualizar contrasena';
      }
    });

    document.getElementById('backToAppBtn').addEventListener('click', () => {
      window.location.href = appDeepLink;
    });
  </script>
</body>
</html>
