<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Campus - Restablecer contraseña</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="loadingState">
        <div class="icon loading">⏳</div>
        <h1>Verificando enlace...</h1>
        <p class="subtitle">Un momento por favor</p>
      </div>

      <div id="formState" style="display:none;">
        <h1>Nueva contraseña</h1>
        <p class="subtitle">Ingresá tu nueva contraseña para tu cuenta</p>
        <form id="resetForm">
          <label for="password">Nueva contraseña</label>
          <input type="password" id="password" minlength="6" required placeholder="Mínimo 6 caracteres" />

          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" minlength="6" required placeholder="Repetí tu contraseña" />

          <button type="submit" id="submitBtn">Actualizar contraseña</button>
        </form>
        <div class="message" id="messageBox"></div>
      </div>

      <div id="errorState" style="display:none;">
        <div class="icon error">✕</div>
        <h1>Enlace inválido o expirado</h1>
        <p class="subtitle">Solicitá un nuevo enlace de recuperación desde la app.</p>
      </div>

      <div id="successState" style="display:none;">
        <div class="icon success">✓</div>
        <h1>¡Contraseña actualizada!</h1>
        <p class="subtitle">Ya podés volver a la app e iniciar sesión con tu nueva contraseña.</p>
        <button id="backToAppBtn">Volver a la app</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const { url, anonKey, appDeepLink } = window.SUPABASE_CONFIG;
    const supabaseClient = supabase.createClient(url, anonKey);

    const loadingState = document.getElementById('loadingState');
    const formState = document.getElementById('formState');
    const errorState = document.getElementById('errorState');
    const successState = document.getElementById('successState');
    const messageBox = document.getElementById('messageBox');

    function showState(state) {
      [loadingState, formState, errorState, successState].forEach(el => el.style.display = 'none');
      state.style.display = 'block';
    }

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message show ${type}`;
    }

    let recoverySessionReady = false;

    // Sigue funcionando para el flujo viejo (hash #access_token...&type=recovery)
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoverySessionReady = true;
        showState(formState);
      }
    });

    (async () => {
      const hash = window.location.hash;
      const queryParams = new URLSearchParams(window.location.search);
      const code = queryParams.get('code');

      // Caso 1: error explícito en la URL
      if (hash.includes('error') || queryParams.get('error')) {
        showState(errorState);
        return;
      }

      // Caso 2: flujo PKCE -> Supabase manda ?code=xxxx
      if (code) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
        if (error) {
          showState(errorState);
        } else {
          recoverySessionReady = true;
          showState(formState);
        }
        return;
      }

      // Caso 3: fallback para el flujo viejo por si el evento tarda
      setTimeout(async () => {
        if (recoverySessionReady) return;

        const { data } = await supabaseClient.auth.getSession();
        if (data.session && hash.includes('type=recovery')) {
          showState(formState);
        } else {
          showState(errorState);
        }
      }, 2500);
    })();

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      if (password !== confirmPassword) {
        showMessage('Las contraseñas no coinciden', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Actualizando...';

      const { error } = await supabaseClient.auth.updateUser({ password });

      if (error) {
        showMessage(`Error: ${error.message}`, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Actualizar contraseña';
        return;
      }

      showState(successState);
    });

    document.getElementById('backToAppBtn').addEventListener('click', () => {
      window.location.href = appDeepLink;
    });
  </script>
</body>
</html>
