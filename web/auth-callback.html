<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Campus - Confirmacion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="loadingState">
        <div class="icon loading">...</div>
        <h1>Confirmando...</h1>
        <p class="subtitle">Un momento por favor</p>
      </div>
      <div id="successState" style="display:none;">
        <div class="icon success">OK</div>
        <h1>Correo verificado</h1>
        <p class="subtitle">Tu cuenta fue confirmada. Ya puedes volver a la app e iniciar sesion.</p>
        <button id="backToAppBtn">Volver a la app</button>
      </div>
      <div id="errorState" style="display:none;">
        <div class="icon error">X</div>
        <h1>No se pudo confirmar</h1>
        <p class="subtitle" id="errorDetail">El enlace es invalido o ya expiro. Pide un nuevo enlace desde la app.</p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@16"></script>
  <script src="config.js"></script>
  <script>
    const { endpoint, projectId, appDeepLink } = window.APPWRITE_CONFIG;
    const { Client, Account } = Appwrite;
    const client = new Client().setEndpoint(endpoint).setProject(projectId);
    const account = new Account(client);

    const loadingState = document.getElementById('loadingState');
    const successState = document.getElementById('successState');
    const errorState = document.getElementById('errorState');
    const errorDetail = document.getElementById('errorDetail');

    function showState(state) {
      [loadingState, successState, errorState].forEach(el => el.style.display = 'none');
      state.style.display = 'block';
    }

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('userId');
      const secret = params.get('secret');

      if (!userId || !secret) {
        errorDetail.textContent = 'Faltan userId o secret en el enlace.';
        showState(errorState);
        return;
      }

      try {
        await account.updateVerification(userId, secret);
        showState(successState);
      } catch (e) {
        errorDetail.textContent = e.message || errorDetail.textContent;
        showState(errorState);
      }
    })();

    document.getElementById('backToAppBtn').addEventListener('click', () => {
      window.location.href = appDeepLink;
    });
  </script>
</body>
</html>
