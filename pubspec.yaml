name: nexus_campus
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado y navegación
  flutter_riverpod: ^2.4.10
  go_router: ^13.2.1

  # Mapas
  flutter_map: ^7.0.2
  flutter_map_animations: ^0.7.0
  latlong2: ^0.9.1
  geolocator: ^14.0.3

  # Imágenes
  cached_network_image: ^3.3.1
  image_picker: ^1.2.3
  image: ^4.8.0

  # Utilidades
  equatable: ^2.0.5
  intl: ^0.19.0
  http: ^1.5.0

  # Backend
  appwrite: ^17.1.0
  flutter_dotenv: ^5.1.0

  # Permisos y almacenamiento
  permission_handler: ^12.0.3
  local_auth: ^3.0.1
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1

  # Notificaciones
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  package_info_plus: ^8.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/env/appwrite.env
    