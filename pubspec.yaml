name: nexus_campus
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.10
  go_router: ^13.2.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^14.0.3
  cached_network_image: ^3.3.1
  image_picker: ^1.2.3
  equatable: ^2.0.5
  intl: ^0.19.0
  supabase_flutter: ^2.3.0
  flutter_dotenv: ^5.1.0
  permission_handler: ^12.0.3
  local_auth: ^3.0.1
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  # Used directly to request OSRM route estimates for map origin/destination.
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
    - .env
